[pytest]
testpaths = tests
# Coverage runs automatically with the suite (reporting only, no pass/fail gate).
# Scoped to our app code so env/, tests/, and scheduled_tasks_* are excluded.
addopts = -q
    --cov=app --cov=functions --cov=helpers --cov=data --cov=extensions --cov=routes
    --cov-report=term

# Silence third-party deprecation noise (Werkzeug 3.1.3's route compiler uses
# ast.Str, which Python 3.12 flags for removal in 3.14). These are not from our
# code; any DeprecationWarning we actually cause still shows.
filterwarnings =
    ignore:ast\.Str is deprecated:DeprecationWarning
    ignore:Attribute s is deprecated:DeprecationWarning
    ignore:.* deprecated - use
